name: CI — Import Check

on:
  pull_request:
    branches: [main]
  push:
    branches: ["feature/**"]

jobs:
  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python -m tests.pre_flight.check_imports
