version: '3.8'
services:
  agent-trader:
    image: europe-west1-docker.pkg.dev/gen-lang-client-0441524375/agent-trader/swarm:latest
    container_name: agent_trader_swarm
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - GOOGLE_CLOUD_PROJECT=gen-lang-client-0441524375
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./dashboard.json:/app/dashboard.json
      - ./trade_log.json:/app/trade_log.json
      - ./active_assets.json:/app/active_assets.json
      - ./pnl_snapshots.json:/app/pnl_snapshots.json
    networks: [trader_net]

networks:
  trader_net:
    driver: bridge
