substitutions:
  _SHA_SHORT: "nogit"
  _REGION: "europe-west1"
  _PROJECT_ID: "gen-lang-client-0441524375"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/agent-trader/swarm:latest"
      - -t
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/agent-trader/swarm:git-${_SHA_SHORT}"
      - .

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/agent-trader/swarm:latest"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/agent-trader/swarm:git-${_SHA_SHORT}"

options:
  machineType: E2_MEDIUM
  logging: CLOUD_LOGGING_ONLY
